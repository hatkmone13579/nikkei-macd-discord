# .github/workflows/macd.yml — v2 (keepaliveは自前方式・外部Action不使用)
# 平日 19:00 JST(=10:00 UTC) に自動実行（PC不要・GitHub上で完結）
name: nikkei-macd-discord

on:
  schedule:
    - cron: "0 10 * * 1-5"    # 月〜金 10:00 UTC = 19:00 JST
  workflow_dispatch:
    inputs:
      test:
        description: "セットアップテスト（Webhook疎通のみ・株価取得なし）"
        type: boolean
        default: false
      force:
        description: "休場日・当日データ未反映チェックを無視して強制実行"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: macd
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Japanese fonts
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - uses: actions/cache@v4
        with:
          path: macd_state.json
          key: macd-state-${{ github.run_id }}
          restore-keys: macd-state-

      - run: python nikkei_macd_discord.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ADMIN_WEBHOOK_URL: ${{ secrets.ADMIN_WEBHOOK_URL }}
          TEST_MODE: ${{ inputs.test }}
          FORCE_RUN: ${{ inputs.force }}
          # ▼ お好みで上書き可能（コード編集不要）。例:
          # VOLUME_FILTER_ENABLED: "true"
          # VOLUME_CONFIRM_RATIO: "1.2"
          # MIN_GRADE: "C"
          # CHART_TOP_N: "3"

      # 自動延命：外部Action不使用。週1回(月曜)に空コミットを打って
      # 60日無活動による cron 自動停止を回避する。
      - name: Keepalive (毎週月曜に空コミットで延命)
        if: github.event_name == 'schedule'
        run: |
          if [ "$(date -u +%u)" = "1" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "keepalive: prevent workflow auto-disable"
            git push
          else
            echo "keepalive: 月曜のみ実行。本日はスキップ。"
          fi
